<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 5 — innerHTML</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark px-4 py-3">
    <span class="navbar-brand fw-bold">Proyecto 5 — Agregar elementos con innerHTML</span>
  </nav>
  <div class="container py-4">
    <div class="row mb-4">
      <div class="col-12">
        <h2 class="fw-bold">Insertar HTML con innerHTML</h2>
        <p class="text-muted">Cada boton agrega un componente HTML diferente al stage usando innerHTML.</p>
      </div>
    </div>
    <div class="row g-2 mb-4">
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-inner" data-tipo="parrafo">+ Parrafo</button></div>
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-success w-100 btn-inner" data-tipo="lista">+ Lista</button></div>
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-warning w-100 btn-inner" data-tipo="tabla">+ Tabla</button></div>
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-info w-100 text-white btn-inner" data-tipo="card">+ Card</button></div>
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-danger w-100 btn-inner" data-tipo="alerta">+ Alerta</button></div>
      <div class="col-6 col-md-4 col-lg-2"><button class="btn btn-outline-dark w-100" id="btn-limpiar">Limpiar</button></div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white d-flex align-items-center gap-2">
        <span class="badge bg-secondary">STAGE</span>
        <small>Los elementos aparecen aqui</small>
      </div>
      <div class="card-body" id="stage" style="min-height: 300px;">
        <p class="text-muted fst-italic" id="placeholder">Usa los botones para agregar elementos con innerHTML</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
