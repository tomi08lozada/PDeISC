<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 4 — Nodos a</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- FIX 1: agregado navbar-expand y container-fluid para que no desborde en móvil -->
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3 py-3">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold fs-6">Proyecto 4 — Crear y Modificar Nodos &lt;a&gt;</span>
    </div>
  </nav>

  <div class="container-fluid container-md py-4">
    <div class="row mb-3">
      <div class="col-12">
        <h2 class="fw-bold">Gestión de nodos &lt;a&gt;</h2>
        <p class="text-muted">Crea enlaces dinámicamente y luego modifica sus atributos.</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <!-- Tarjeta Crear -->
      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white"><strong>Crear nodos &lt;a&gt;</strong></div>
          <div class="card-body">
            <!-- FIX 2: col-12 col-sm-6 col-md-4 col-lg-2 para que en móvil cada botón ocupe toda la fila -->
            <div class="row g-2">
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-crear" data-href="https://google.com" data-texto="Google">Google</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-crear" data-href="https://youtube.com" data-texto="YouTube">YouTube</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-crear" data-href="https://github.com" data-texto="GitHub">GitHub</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-crear" data-href="https://wikipedia.org" data-texto="Wikipedia">Wikipedia</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-primary w-100 btn-crear" data-href="https://netflix.com" data-texto="Netflix">Netflix</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-2"><button class="btn btn-outline-danger w-100" id="btn-limpiar">Limpiar</button></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tarjeta Modificar -->
      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-header bg-warning text-dark"><strong>Modificar atributos de los enlaces</strong></div>
          <div class="card-body">
            <!-- FIX 3: col-12 col-sm-6 col-md-4 col-lg-3 — texto largo necesita más espacio -->
            <div class="row g-2">
              <div class="col-12 col-sm-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-modificar" data-id="Google" data-nuevo-href="https://maps.google.com" data-nuevo-texto="Google Maps">Google → Maps</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-modificar" data-id="YouTube" data-nuevo-href="https://music.youtube.com" data-nuevo-texto="YouTube Music">YouTube → Music</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-modificar" data-id="GitHub" data-nuevo-href="https://gist.github.com" data-nuevo-texto="GitHub Gist">GitHub → Gist</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-modificar" data-id="Wikipedia" data-nuevo-href="https://es.wikipedia.org" data-nuevo-texto="Wikipedia ES">Wiki → Español</button></div>
              <div class="col-12 col-sm-6 col-md-4 col-lg-3"><button class="btn btn-warning w-100 btn-modificar" data-id="Netflix" data-nuevo-href="https://disneyplus.com" data-nuevo-texto="Disney+">Netflix → Disney+</button></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- FIX 4: col-lg-6 → col-md-6 para que se ponga lado a lado desde tablets -->
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-dark text-white"><strong>Enlaces creados</strong></div>
          <div class="card-body" id="contenedor-links">
            <p class="text-muted fst-italic">No hay enlaces. Crea algunos con los botones de arriba.</p>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <strong>Log de cambios</strong>
            <button class="btn btn-sm btn-outline-light" id="btn-limpiar-log">Limpiar log</button>
          </div>
          <!-- FIX 5: max-height movido a CSS, no inline -->
          <div class="card-body p-2 log-panel" id="log-cambios">
            <p class="text-muted fst-italic p-2">Sin cambios registrados.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
