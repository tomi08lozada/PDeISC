<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 6 — Formulario de Registro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <!-- FIX: navbar-expand + container-fluid para que no desborde en móvil -->
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3 py-3">
    <div class="container-fluid">
      <span class="navbar-brand fw-bold">Proyecto 6 — Formulario de Registro</span>
    </div>
  </nav>

  <div class="container-fluid container-md py-4">
    <div class="row g-4">
      <!-- FIX: col-12 col-md-6 para que en móvil sea full width y en tablet lado a lado -->
      <div class="col-12 col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white"><strong>Formulario de Registro</strong></div>
          <div class="card-body">

            <div class="mb-3">
              <label class="form-label fw-semibold" for="inp-nombre">Nombre completo</label>
              <!--
                FIX NOMBRE: pattern solo permite letras y espacios.
                El bloqueo en tiempo real (mientras escribe) lo hace main.js.
              -->
              <input
                type="text"
                id="inp-nombre"
                class="form-control"
                placeholder="Tomás Lozada"
                pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+"
                autocomplete="name"
              />
              <div class="invalid-feedback">Solo se permiten letras y espacios.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="inp-email">Email</label>
              <!--
                FIX EMAIL: type="email" ya exige @ y dominio válido.
              -->
              <input
                type="email"
                id="inp-email"
                class="form-control"
                placeholder="tomas08@mail.com"
                autocomplete="email"
              />
              <div class="invalid-feedback">Ingresá un email válido (ej: nombre@mail.com).</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="inp-edad">Edad</label>
              <!--
                FIX EDAD: type="number" bloquea letras.
                inputmode="numeric" muestra teclado numérico en móvil.
              -->
              <input
                type="number"
                id="inp-edad"
                class="form-control"
                min="1"
                max="120"
                placeholder="18"
                inputmode="numeric"
              />
              <div class="invalid-feedback">Ingresá una edad entre 1 y 120.</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Género</label>
              <!-- FIX: flex-wrap para que los radio no se corten en pantallas chicas -->
              <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="genero" id="radio-m" value="Masculino"/>
                  <label class="form-check-label" for="radio-m">Masculino</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="genero" id="radio-f" value="Femenino"/>
                  <label class="form-check-label" for="radio-f">Femenino</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="genero" id="radio-o" value="Otro"/>
                  <label class="form-check-label" for="radio-o">Otro</label>
                </div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold" for="sel-pais">País</label>
              <select id="sel-pais" class="form-select">
                <option value="">-- Selecciona --</option>
                <option value="Argentina">Argentina</option>
                <option value="Chile">Chile</option>
                <option value="Uruguay">Uruguay</option>
                <option value="Brasil">Brasil</option>
                <option value="Mexico">México</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Intereses</label>
              <div class="row">
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input chk-interes" type="checkbox" value="Tecnologia" id="chk-tec"/>
                    <label class="form-check-label" for="chk-tec">Tecnología</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input chk-interes" type="checkbox" value="Deportes" id="chk-dep"/>
                    <label class="form-check-label" for="chk-dep">Deportes</label>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input chk-interes" type="checkbox" value="Musica" id="chk-mus"/>
                    <label class="form-check-label" for="chk-mus">Música</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input chk-interes" type="checkbox" value="Arte" id="chk-art"/>
                    <label class="form-check-label" for="chk-art">Arte</label>
                  </div>
                </div>
              </div>
            </div>

            <button id="btn-registrar" class="btn btn-primary w-100 fw-bold">Registrarse</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-6">
        <div class="card shadow-sm h-100">
          <div class="card-header bg-success text-white"><strong>Vista previa del registro</strong></div>
          <div class="card-body" id="preview">
            <p class="text-muted fst-italic">Completa el formulario para ver los datos en tiempo real.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
