<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proyecto 1 — Manipulación DOM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-5">Proyecto 1 — Manipulación DOM</span>
  </nav>

  <div class="container py-5">
    <div class="row mb-4">
      <div class="col-12">
        <h1 class="display-5 fw-black">Eventos DHTML</h1>
        <p class="text-muted">Usá los botones para manipular elementos del DOM dinámicamente.</p>
      </div>
    </div>

    <!-- Botones -->
    <div class="row g-3 mb-5">
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-agregar-h1" class="btn btn-success w-100">
          Agregar H1
        </button>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-cambiar-texto" class="btn btn-primary w-100">
          Cambiar texto
        </button>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-cambiar-color" class="btn btn-warning w-100">
          Cambiar color
        </button>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-agregar-img" class="btn btn-info w-100 text-white">
          Agregar imagen
        </button>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-cambiar-img" class="btn btn-secondary w-100">
          Cambiar imagen
        </button>
      </div>
      <div class="col-6 col-md-4 col-lg-2">
        <button id="btn-cambiar-size" class="btn btn-danger w-100">
          Cambiar tamaño
        </button>
      </div>
    </div>

    <!-- Stage -->
    <div class="row">
      <div class="col-12">
        <div class="card shadow-sm">
          <div class="card-header d-flex align-items-center gap-2">
            <span class="badge bg-dark">STAGE</span>
            <small class="text-muted">Aquí aparecen los elementos creados</small>
          </div>
          <div class="card-body" id="stage" style="min-height: 260px;">
            <p class="text-muted fst-italic" id="placeholder-msg">↑ Usá los botones para manipular el DOM</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast de feedback -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="toastFeedback" class="toast align-items-center text-white bg-dark border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toast-msg">Acción realizada.</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js" defer></script>
</body>
</html>
